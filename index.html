<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>For Kholoud 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#080002;cursor:none;font-family:serif}

/* CURSOR */
#cur{position:fixed;width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle,#ff8fa3,#7B0000);
  pointer-events:none;transform:translate(-50%,-50%);z-index:9999;
  box-shadow:0 0 10px #ff6b8a99}

/* CANVASES */
#bgC,#ptC{position:fixed;inset:0;z-index:0}
#ptC{z-index:1;pointer-events:none}

/* VIGNETTE */
#vig{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 30%,#000 100%);
  opacity:.5}

/* OVERLAY EFFECTS */
#flash{position:fixed;inset:0;background:#ffe8d0;opacity:0;pointer-events:none;z-index:80;transition:opacity .15s}
#flash.on{opacity:.55}
#veil{position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;z-index:70;transition:opacity .7s ease}
#veil.show{opacity:1}
.sw{position:fixed;border-radius:50%;border:1.5px solid #D4AF3766;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:75;
  animation:swAnim 1.1s ease-out forwards}
@keyframes swAnim{0%{transform:translate(-50%,-50%) scale(0);opacity:.8}100%{transform:translate(-50%,-50%) scale(8);opacity:0}}
.pt{position:fixed;border-radius:50%;pointer-events:none;z-index:76}

/* GLOW LINE */
.gline{position:fixed;bottom:0;left:0;right:0;height:1px;z-index:100;
  background:linear-gradient(90deg,transparent,#7B0000,#D4AF37,#7B0000,transparent);opacity:.4}

/* ============================
   LOCK SCREEN
============================ */
#lockScreen{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  transition:opacity .9s ease,transform .9s ease
}
#lockScreen.hide{opacity:0;transform:scale(1.05) translateY(-20px);pointer-events:none}

.lbl{font-family:'Cinzel',serif;font-size:clamp(9px,1.5vw,13px);
  color:#D4AF3766;letter-spacing:.5em;text-transform:uppercase;
  margin-bottom:36px;opacity:0;animation:fdown 1.8s .1s ease forwards}
.ded{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(14px,2.2vw,20px);color:#D4AF3788;
  margin-bottom:40px;opacity:0;animation:fdown 1.8s .4s ease forwards}
@keyframes fdown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

/* ENVELOPE / RIBBON */
#envBox{
  position:relative;
  margin-bottom:50px;
  width:160px;height:160px;
  opacity:0;animation:fup 1.8s .2s ease forwards;
  filter:drop-shadow(0 0 25px rgba(212,175,55,.2)) drop-shadow(0 10px 30px rgba(0,0,0,.8));
  transition:filter .08s
}
@keyframes fup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
#envFloat{animation:sfloat 3.5s ease-in-out infinite}
@keyframes sfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
#envC{width:160px;height:160px;display:block}

/* SLIDER */
#sliderBox{
  position:relative;width:clamp(250px,60vw,340px);height:56px;
  background:linear-gradient(90deg,#110005,#260010);
  border:1px solid #7B000044;border-radius:28px;
  overflow:hidden;
  box-shadow:0 0 32px #7B000033,inset 0 0 20px #00000055;
  opacity:0;animation:fup 1.8s .7s ease forwards
}
#sFill{position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(90deg,#7B000044,#C0392B33);width:0%;pointer-events:none}
#sGlow{position:absolute;top:50%;left:0;width:0%;height:1px;
  background:linear-gradient(90deg,transparent,#D4AF37,transparent);
  transform:translateY(-50%);filter:blur(1px);pointer-events:none}
#sLbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:clamp(9px,1.4vw,11px);
  letter-spacing:.38em;color:#D4AF3777;pointer-events:none;user-select:none}
#sThumb{position:absolute;left:4px;top:50%;transform:translateY(-50%);
  width:48px;height:48px;border-radius:50%;
  background:radial-gradient(circle at 36% 30%,#ff8fa3,#7B0000 70%);
  cursor:grab;z-index:5;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px #C0392B88,0 3px 12px #00000077;touch-action:none}
#sThumb:active{cursor:grabbing}
#sThumb svg{width:20px;height:20px;pointer-events:none}

/* ============================
   REVEAL SCREEN
============================ */
#revealScreen{
  position:fixed;inset:0;z-index:9;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 20px;gap:0;
  opacity:0;pointer-events:none;transition:opacity .9s ease
}
#revealScreen.show{opacity:1;pointer-events:all}

/* BIG HEART */
#heartBox{
  position:relative;flex-shrink:0;
  width:clamp(220px,46vw,360px);
  height:clamp(220px,46vw,360px);
  margin-bottom:20px;
  opacity:0;transform:scale(0);
}
#heartBox.pop{animation:hpop 1s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes hpop{
  0%{opacity:0;transform:scale(0)}
  55%{transform:scale(1.12)}
  75%{transform:scale(.94)}
  100%{opacity:1;transform:scale(1)}}
  
#heartBox.alive{
  opacity:1; 
  transform:scale(1);
  animation:halive 3s ease-in-out infinite;
}
@keyframes halive{
  0%,100%{filter:drop-shadow(0 0 25px #C0392B88)}
  50%{filter:drop-shadow(0 0 55px #C0392BCC)}}

#heartSvg{width:100%;height:100%;display:block}

#nameBox{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding-bottom:8%
}
#nameTxt{
  font-family:'Great Vibes',cursive;
  font-size:clamp(38px,8.5vw,76px);
  color:#fff;
  text-shadow:0 0 20px #ffb6c1,0 0 50px #C0392B;
  white-space:nowrap;line-height:1
}
#nameTxt span{
  display:inline-block;opacity:0;
  transform:translateY(14px) scale(.6);
  transition:opacity .3s ease,transform .3s cubic-bezier(.34,1.56,.64,1)
}
#nameTxt span.on{opacity:1;transform:translateY(0) scale(1)}

/* pulse rings around heart */
.ring{position:absolute;border-radius:50%;border:1px solid #D4AF3733;
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
  animation:rp 3.5s ease-in-out infinite}
.ring:nth-child(1){width:112%;height:112%;animation-delay:0s}
.ring:nth-child(2){width:126%;height:126%;animation-delay:.9s}
.ring:nth-child(3){width:140%;height:140%;animation-delay:1.8s}
@keyframes rp{
  0%,100%{opacity:0;transform:translate(-50%,-50%) scale(.93)}
  50%{opacity:.6;transform:translate(-50%,-50%) scale(1)}}

/* QUOTES */
#qWrap{text-align:center;max-width:540px;width:92%;flex-shrink:0}
.qline{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;
  font-size:clamp(13px,2.4vw,19px);color:#F0D060CC;line-height:2;min-height:1.6em}
.qline .w{
  display:inline-block;opacity:0;margin-right:.25em;
  transition:opacity .3s ease,transform .3s cubic-bezier(.34,1.2,.64,1)
}
.w.up{transform:translateY(-18px)}
.w.dn{transform:translateY(18px)}
.w.on{opacity:1;transform:translateY(0)}

/* ornament */
.orn{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0;
  opacity:0;transition:opacity .7s ease}
.orn.on{opacity:1}
.ol{height:1px;background:linear-gradient(90deg,transparent,#D4AF37,transparent);
  flex:1;max-width:80px;transform:scaleX(0);transform-origin:center;transition:transform .8s ease}
.orn.on .ol{transform:scaleX(1)}
.od{color:#D4AF37;font-size:12px;letter-spacing:.2em}

/* SIGNATURE */
#sig{
  font-family:'Dancing Script',cursive;
  font-size:clamp(18px,3.2vw,30px);
  color:#D4AF37;opacity:0;margin-top:12px;
  text-shadow:0 0 18px #D4AF3755;
  transition:opacity .9s ease,transform .9s ease;
  transform:translateX(-14px) rotate(-1.5deg)
}
#sig.on{opacity:1;transform:translateX(0) rotate(0deg)}
#sig.pulse{animation:spulse 3s ease-in-out infinite}
@keyframes spulse{
  0%,100%{text-shadow:0 0 16px #D4AF3744}
  50%{text-shadow:0 0 36px #D4AF37AA}}
#inkbar{display:block;height:1px;width:0;
  background:linear-gradient(90deg,#D4AF37,transparent);
  margin:5px auto 0;transition:width 1s .3s ease}
#inkbar.on{width:85%}
</style>
</head>
<body>

<div id="cur"></div>
<canvas id="bgC"></canvas>
<canvas id="ptC"></canvas>
<div id="vig"></div>
<div id="flash"></div>
<div id="veil"></div>
<div class="gline"></div>

<div id="lockScreen">
  <div class="lbl">a letter wrapped in love</div>
  <div class="ded">My love, Kholoud &hellip;</div>

  <div id="envBox">
    <div id="envFloat">
      <canvas id="envC" width="160" height="160"></canvas>
    </div>
  </div>

  <div id="sliderBox">
    <div id="sFill"></div>
    <div id="sGlow"></div>
    <div id="sLbl">untie the ribbon</div>
    <div id="sThumb">
      <svg viewBox="0 0 24 22" fill="none">
        <path d="M12 20C12 20 2 13 2 7C2 4 4 2 7 2C9.5 2 11 3.5 12 5.5C13 3.5 14.5 2 17 2C20 2 22 4 22 7C22 13 12 20 12 20Z" fill="white" opacity=".9"/>
      </svg>
    </div>
  </div>
</div>

<div id="revealScreen">
  <div id="heartBox">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <svg id="heartSvg" viewBox="0 0 100 95">
      <defs>
        <radialGradient id="hg" cx="38%" cy="30%" r="68%">
          <stop offset="0%" stop-color="#FF8FA3"/>
          <stop offset="38%" stop-color="#C0392B"/>
          <stop offset="100%" stop-color="#3E0008"/>
        </radialGradient>
        <radialGradient id="hs" cx="30%" cy="24%" r="28%">
          <stop offset="0%" stop-color="white" stop-opacity=".28"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </radialGradient>
        <filter id="hf" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <path d="M50 88C50 88 5 55 5 28C5 14 16 4 28 4C36 4 44 9 50 18C56 9 64 4 72 4C84 4 95 14 95 28C95 55 50 88 50 88Z"
            fill="url(#hg)" filter="url(#hf)"/>
      <path d="M50 88C50 88 5 55 5 28C5 14 16 4 28 4C36 4 44 9 50 18C56 9 64 4 72 4C84 4 95 14 95 28C95 55 50 88 50 88Z"
            fill="url(#hs)"/>
    </svg>
    <div id="nameBox">
      <div id="nameTxt"></div>
    </div>
  </div>

  <div id="qWrap">
    <div class="qline" id="q1"></div>
    <div class="orn" id="o1"><div class="ol"></div><div class="od">✦ ♥ ✦</div><div class="ol"></div></div>
    <div class="qline" id="q2"></div>
    <div class="orn" id="o2"><div class="ol"></div><div class="od">✦</div><div class="ol"></div></div>
    <div id="sig">— Your Husband —<span id="inkbar"></span></div>
  </div>
</div>

<script>
/* ── CURSOR ── */
const cur=document.getElementById('cur');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});

/* ── BG + PETAL CANVAS ── */
const bgC=document.getElementById('bgC'),bgX=bgC.getContext('2d');
const ptC=document.getElementById('ptC'),ptX=ptC.getContext('2d');
let W=0,H=0,T=0;
function resize(){W=bgC.width=ptC.width=innerWidth;H=bgC.height=ptC.height=innerHeight}
addEventListener('resize',resize);resize();

const STARS=Array.from({length:170},()=>({
  x:Math.random(),y:Math.random(),r:.3+Math.random()*1.4,
  sp:1.4+Math.random()*3,ph:Math.random()*Math.PI*2,op:.25+Math.random()*.75
}));
function drawBG(){
  bgX.clearRect(0,0,W,H);
  const g=bgX.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.8);
  g.addColorStop(0,'#1c0009');g.addColorStop(.55,'#0d0004');g.addColorStop(1,'#050001');
  bgX.fillStyle=g;bgX.fillRect(0,0,W,H);
  [[.18,.82,.44,.24],[.82,.14,.36,.17]].forEach(([ax,ay,r,a])=>{
    const ag=bgX.createRadialGradient(W*ax,H*ay,0,W*ax,H*ay,W*r);
    ag.addColorStop(0,`rgba(125,0,32,${a})`);ag.addColorStop(1,'transparent');
    bgX.fillStyle=ag;bgX.fillRect(0,0,W,H);
  });
  T+=.012;
  for(const s of STARS){
    const op=s.op*(.45+.55*Math.sin(T*s.sp+s.ph));
    bgX.beginPath();bgX.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,235,235,${op})`;bgX.fill();
  }
}

const PCOLS=['#C0392B','#8B0000','#E86090','#D4AF37','#FF8FA3','#FFB6C1'];
const PETALS=Array.from({length:44},()=>({
  x:Math.random()*2000,y:-Math.random()*1200,
  vx:(Math.random()-.5)*1.1,vy:.6+Math.random()*1.4,
  rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.038,
  w:9+Math.random()*15,h:6+Math.random()*11,
  op:.45+Math.random()*.5,col:PCOLS[Math.floor(Math.random()*PCOLS.length)]
}));
function drawPetals(){
  ptX.clearRect(0,0,W,H);
  for(const p of PETALS){
    p.x+=p.vx+Math.sin(T*.8+p.y*.009)*.45;p.y+=p.vy;p.rot+=p.rv;
    if(p.y>H+30){p.y=-30;p.x=Math.random()*W}
    ptX.save();ptX.translate(p.x,p.y);ptX.rotate(p.rot);
    ptX.globalAlpha=p.op;ptX.beginPath();ptX.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);
    ptX.fillStyle=p.col;ptX.fill();ptX.restore();
  }
}
function loop(){drawBG();drawPetals();requestAnimationFrame(loop)}
loop();

/* ── UNTYING RIBBON ENVELOPE ── */
const ec = document.getElementById('envC');
const sx = ec.getContext('2d');
const CX = 80, CY = 80;
const EW = 140, EH = 96;
const EX = CX - EW/2, EY = CY - EH/2;

function drawEnvelope(pct) {
  sx.clearRect(0,0,160,160);
  sx.save();
  sx.translate(0, -pct * 15); 

  sx.shadowColor = 'rgba(212, 175, 55, 0.4)';
  sx.shadowBlur = 18;

  const eg = sx.createLinearGradient(EX, EY, EX+EW, EY+EH);
  eg.addColorStop(0, 'rgba(255, 255, 255, 0.12)');
  eg.addColorStop(0.5, 'rgba(255, 255, 255, 0.05)');
  eg.addColorStop(1, 'rgba(255, 255, 255, 0.01)');
  sx.fillStyle = eg;
  sx.beginPath();
  sx.rect(EX, EY, EW, EH);
  sx.fill();

  sx.shadowBlur = 0;
  sx.beginPath();
  sx.moveTo(EX, EY + EH);
  sx.lineTo(CX, EY + EH * 0.55);
  sx.lineTo(EX + EW, EY + EH);
  sx.strokeStyle = 'rgba(212, 175, 55, 0.2)'; 
  sx.stroke();

  sx.strokeStyle = 'rgba(212, 175, 55, 0.5)';
  sx.lineWidth = 1.2;
  sx.strokeRect(EX, EY, EW, EH);

  sx.beginPath();
  sx.moveTo(EX, EY);
  let flapY = EY + EH * 0.55;
  if (pct > 0.4) {
    let openPct = Math.min(1, (pct - 0.4) * 1.8);
    flapY = EY + EH * 0.55 - (EH * 0.95) * openPct;
  }
  sx.lineTo(CX, flapY);
  sx.lineTo(EX + EW, EY);
  sx.fillStyle = 'rgba(255, 255, 255, 0.05)';
  sx.fill();
  sx.stroke();

  const untie = Math.min(1, pct * 1.5);
  const bandFade = Math.max(0, 1 - pct * 3);
  
  sx.fillStyle = '#C0392B';
  sx.shadowColor = '#FF8FA3';
  sx.shadowBlur = 8;
  
  sx.globalAlpha = bandFade;
  sx.fillRect(CX - 8, EY, 16, EH); 
  sx.fillRect(EX, CY - 8, EW, 16); 

  const bowFade = Math.max(0, 1 - pct * 1.5);
  sx.globalAlpha = bowFade;
  
  const lw = 18 * (1 - untie); 
  if (lw > 0.5) {
    sx.lineWidth = 4;
    sx.strokeStyle = '#C0392B';
    sx.beginPath(); sx.ellipse(CX - 14 - lw/2, CY, lw, 10, 0, 0, Math.PI*2); sx.stroke();
    sx.beginPath(); sx.ellipse(CX + 14 + lw/2, CY, lw, 10, 0, 0, Math.PI*2); sx.stroke();
  }
  if (1 - untie > 0) {
    sx.beginPath(); sx.arc(CX, CY, 8 * (1 - untie), 0, Math.PI*2); sx.fill();
  }

  sx.lineWidth = 5;
  sx.lineCap = 'round';
  sx.strokeStyle = '#C0392B';

  sx.globalAlpha = Math.max(0, 1 - pct * 1.5);
  sx.beginPath();
  sx.moveTo(CX - untie*12, CY + untie*12);
  sx.bezierCurveTo(
    CX - 15, CY + 15, 
    CX - 10 - untie*10, CY + 30 + untie*20, 
    CX - 25 - untie*25, CY + 45 + untie*35
  );
  sx.stroke();

  sx.globalAlpha = 1; 
  if (pct < 0.999) { 
    sx.beginPath();
    sx.moveTo(CX + untie*12, CY + untie*12);
    sx.bezierCurveTo(
      CX + 15 + pct*20, CY + 15, 
      CX + 10 + pct*60, CY + 30 - pct*15, 
      CX + 35 + pct*130, CY + 45 - pct*25
    );
    sx.stroke();
  }

  sx.restore();
}
drawEnvelope(0);

/* ── SLIDER ── */
const sThumb=document.getElementById('sThumb');
const sFill=document.getElementById('sFill');
const sGlow=document.getElementById('sGlow');
const sBox=document.getElementById('sliderBox');
const sLbl=document.getElementById('sLbl');
const envBox=document.getElementById('envBox');
const vig=document.getElementById('vig');
const lockScr=document.getElementById('lockScreen');

let drag=false,sx0=0,curX=0,done=false;
function maxX(){return sBox.clientWidth-sThumb.offsetWidth-8}

function setPos(x){
  const mx=maxX();
  x=Math.max(0,Math.min(x,mx));
  curX=x;
  const p=x/mx;
  sThumb.style.left=(4+x)+'px';
  sFill.style.width=(p*100)+'%';
  sGlow.style.width=(p*100)+'%';
  sLbl.style.opacity=Math.max(0,1-p*3);
  
  drawEnvelope(p);
  const g = 25 + p*45;
  envBox.style.filter = `drop-shadow(0 0 ${g}px rgba(212,175,55,${.3+p*.6})) drop-shadow(0 10px 30px rgba(0,0,0,.8))`;
  vig.style.opacity=(.5+p*.42)+'';
  
  if(p>=.995&&!done){
    done=true;
    unlock();
  }
}

sThumb.addEventListener('mousedown',e=>{e.preventDefault();drag=true;sx0=e.clientX-curX});
sThumb.addEventListener('touchstart',e=>{drag=true;sx0=e.touches[0].clientX-curX},{passive:true});
document.addEventListener('mousemove',e=>{if(drag)setPos(e.clientX-sx0)});
document.addEventListener('touchmove',e=>{if(drag)setPos(e.touches[0].clientX-sx0)},{passive:true});
document.addEventListener('mouseup',snap);document.addEventListener('touchend',snap);
function snap(){
  if(!drag)return;drag=false;
  if(!done){
    (function rb(){curX*=.7;setPos(curX);if(curX>1)requestAnimationFrame(rb);else{curX=0;setPos(0);sLbl.style.opacity=1}})();
  }
}

/* ── UNLOCK ── */
function unlock(){
  sThumb.style.transition = 'transform 0.3s ease';
  sThumb.style.transform = 'translateY(-50%) scale(0)';

  const fl=document.getElementById('flash');
  fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),200);
  [0,180,360].forEach((d,i)=>{
    setTimeout(()=>{
      const sw=document.createElement('div');sw.className='sw';
      const s=60+i*55;sw.style.width=sw.style.height=s+'px';
      document.body.appendChild(sw);setTimeout(()=>sw.remove(),1200);
    },d);
  });
  burst(75);
  lockScr.classList.add('hide');
  const veil=document.getElementById('veil');
  setTimeout(()=>veil.classList.add('show'),700);
  setTimeout(()=>{
    const rev=document.getElementById('revealScreen');
    rev.classList.add('show');
    veil.style.transition='opacity .8s ease';
    veil.classList.remove('show');
    setTimeout(()=>startReveal(),200);
  },1500);
}

function burst(n){
  const cx=W/2,cy=H/2;
  const cols=['#FF6B8A','#D4AF37','#C0392B','#FFB6C1','#fff','#FF8FA3','#F5D97A'];
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pt';
    const sz=3+Math.random()*9,ang=Math.random()*Math.PI*2,dist=50+Math.random()*200,dur=.5+Math.random()*.9;
    const tx=Math.cos(ang)*dist,ty=Math.sin(ang)*dist;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      transition:transform ${dur}s cubic-bezier(.15,0,.7,1),opacity ${dur}s ease`;
    document.body.appendChild(p);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      p.style.transform=`translate(${tx}px,${ty}px) scale(0)`;p.style.opacity='0';
    }));
    setTimeout(()=>p.remove(),(dur+.1)*1000);
  }
}

/* ── REVEAL SEQUENCE ── */
const NAME='Kholoud';
const Q1='Your name means eternity, and that is exactly how long I will love you.';
const Q2="Before you, I was just counting days. With you, I'm living them.";

function startReveal(){
  const hb=document.getElementById('heartBox');
  hb.classList.add('pop');
  setTimeout(()=>hb.classList.add('alive'),1100);
  setTimeout(writeName,800);
}

function writeName(){
  const el=document.getElementById('nameTxt');
  el.innerHTML='';
  [...NAME].forEach((ch,i)=>{
    const sp=document.createElement('span');
    sp.textContent=ch;el.appendChild(sp);
    setTimeout(()=>sp.classList.add('on'),i*120+50);
  });
  const nameMs=NAME.length*120+400;
  setTimeout(()=>showQ1(),nameMs);
}

function showQ1(){
  writeWords('q1',Q1,'up',()=>{
    setTimeout(()=>{
      document.getElementById('o1').classList.add('on');
      setTimeout(showQ2,600);
    },300);
  });
}
function showQ2(){
  writeWords('q2',Q2,'dn',()=>{
    setTimeout(()=>{
      document.getElementById('o2').classList.add('on');
      setTimeout(showSig,500);
    },300);
  });
}
function showSig(){
  const sig=document.getElementById('sig');
  sig.classList.add('on');
  setTimeout(()=>{
    document.getElementById('inkbar').classList.add('on');
    setTimeout(()=>sig.classList.add('pulse'),1100);
  },400);
}

function writeWords(id,text,dir,cb){
  const el=document.getElementById(id);
  el.innerHTML='';
  const words=text.split(' ');
  words.forEach((w,i)=>{
    const sp=document.createElement('span');
    sp.className='w '+(dir==='up'?'up':'dn');
    sp.textContent=w;el.appendChild(sp);
    setTimeout(()=>sp.classList.add('on'),i*140+60);
  });
  if(cb)setTimeout(cb,words.length*140+480);
}
